version: "3.8"

# 单例部署模式，仅启动一个worker和一个controlplane
services:
  # ── PostgreSQL 16 ──
  postgres:
    image: postgres:16-alpine
    container_name: cloudemu-pg
    environment:
      POSTGRES_USER: "${PG_USER:-postgres}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:-postgres}"
      POSTGRES_DB: "${PG_DB:-cloudemu}"
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DB:-cloudemu}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: cloudemu-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── MinIO 对象存储 ──
  minio:
    image: minio/minio:latest
    container_name: cloudemu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Livekit ──
  livekit:
    image: livekit/livekit-server:v1.13.3
    container_name: cloudemu-livekit
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"  
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 3

  coturn:
    image: coturn/coturn:4.14.0
    container_name: cloudemu-coturn
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE    # 允许非 root 用户绑定 443 等特权端口
    command: >
      -c /etc/turnserver.conf
      --static-auth-secret ${TURN_SECRET:-turn-dev-secret}
      --external-ip ${TURN_EXTERNAL_IP:-127.0.0.1}
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
      - ./turn-cert.pem:/etc/turn-cert.pem:ro
      - ./turn-key.pem:/etc/turn-key.pem:ro

  # ── Control Plane ──
  controlplane:
    build:
      context: ..
      dockerfile: docker/Dockerfile.controlplane
    image: cloudemu-controlplane:latest
    container_name: cloudemu-cp
    ports:
      - "${CP_PORT:-8080}:8080"
    environment:
      ADDR: ":8080"
      DSN: "host=postgres user=${PG_USER:-postgres} password=${PG_PASSWORD:-postgres} dbname=${PG_DB:-cloudemu} port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      REDIS_ADDR: "redis:6379"
      REDIS_PASS: "${REDIS_PASS:-}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-cloudemu}"
      LOG_DIR: "/app/logs"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_JSON: "${LOG_JSON:-false}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:-http://localhost:5173}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_USE_TLS: "${SMTP_USE_TLS:-false}"
    volumes:
      - cp-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker Agent ──
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    image: cloudemu-worker:latest
    container_name: cloudemu-worker
    # gRPC 端口不映射宿主机，Control Plane 通过 Docker 内部网络直连
    environment:
      WORKER_ADDR: "${WORKER_ADDR:-:9090}"
      REDIS_ADDR: "redis:6379"
      REDIS_PASS: "${REDIS_PASS:-}"
      WORKER_REDIS_DB: "${WORKER_REDIS_DB:-1}"
      LIVEKIT_HOST: "${LIVEKIT_HOST:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      EMURUNNER_PATH: "./emurunner"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    restart: unless-stopped

  # ── 前端 Web ──
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: cloudemu-web:latest
    container_name: cloudemu-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      controlplane:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  cp-logs:
